# Smoke-test the Capacitor Android build on a real AVD (GitHub-hosted Linux + KVM).
# This machine has no Android SDK; run this workflow from the Actions tab (workflow_dispatch) or push to main.

name: Android emulator smoke test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: android-emulator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            android-app/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          (cd android-app && npm ci)

      - name: Build web and Capacitor sync
        run: |
          npm run build:web
          (cd android-app && npx cap sync)

      - name: Make Gradle wrapper executable
        run: chmod +x android-app/android/gradlew

      - name: Emulator — assemble, install, launch app
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: |
            set -e
            adb uninstall com.aurnotes.app 2>/dev/null || true
            cd android-app/android
            ./gradlew assembleDebug --no-daemon --stacktrace
            adb devices -l
            adb install -r -t app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -n com.aurnotes.app/.MainActivity || true
            echo "OK: debug APK installed on emulator"
