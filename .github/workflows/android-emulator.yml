# Smoke-test the Capacitor Android build on a real AVD (GitHub-hosted Linux + KVM).
# This machine has no Android SDK; run this workflow from the Actions tab (workflow_dispatch) or push to main.

name: Android emulator smoke test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: android-emulator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            android-app/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          (cd android-app && npm ci)

      - name: Build web and Capacitor sync
        run: |
          npm run build:web
          (cd android-app && npx cap sync)

      - name: Make Gradle wrapper executable
        run: chmod +x android-app/android/gradlew

      - name: Emulator — assemble, install, launch app
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: |
            set -e
            cd android-app/android
            ./gradlew assembleDebug installDebug --no-daemon --stacktrace
            adb devices -l
            # -W waits until the activity window is up; pidof is unreliable (multi-process / WebView)
            OUT=$(adb shell am start -W -n com.aurnotes.app/.MainActivity 2>&1) || true
            echo "$OUT"
            if ! echo "$OUT" | grep -q 'Status: ok'; then
              echo "::error::Activity did not report Status: ok"
              adb logcat -d -t 80 '*:E' || true
              exit 1
            fi
            echo "OK: MainActivity launched on emulator"
