name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: 'Aura Notes-*.dmg'
            artifact_label: mac-dmg
          - os: windows-latest
            artifact_name: 'Aura Notes*.exe'
            artifact_label: windows-portable

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Vite App
        run: npx vite build

      - name: Package with Electron Builder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable code signing on macOS CI (no certificate available)
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --publish never

      - name: Upload Built Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_label }}
          path: release/${{ matrix.artifact_name }}
          if-no-files-found: warn
