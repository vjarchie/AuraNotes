# Builds the Capacitor debug APK on Linux with a full Android SDK (no emulator).
# GitHub-hosted AVD + adb proved flaky for this project; use the uploaded APK in Android Studio’s emulator or on a device.

name: Android build (APK)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            android-app/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          (cd android-app && npm ci)

      - name: Build web and Capacitor sync
        run: |
          npm run build:web
          (cd android-app && npx cap sync)

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Assemble debug APK
        run: |
          set -o pipefail
          chmod +x android-app/android/gradlew
          cd android-app/android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee "$GITHUB_WORKSPACE/gradle-assemble.log"

      - name: Upload Gradle log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-assemble-log
          path: gradle-assemble.log

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: aura-notes-debug-apk
          path: android-app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
